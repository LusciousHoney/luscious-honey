# Cloudflare Pages — Luscious Honey Collective Headquarters
#
# This is a SEPARATE Pages project from Pull Me Under (which deploys from its own
# GitHub repo). This project is a static site; Wrangler uploads ./dist directly.
#
# Deploy:  npm run build && npx wrangler pages deploy
#   (reads `name` and `pages_build_output_dir` below — no directory argument needed)

name = "luscious-honey-collective"
compatibility_date = "2026-07-09"
pages_build_output_dir = "dist"

# Two independent D1 databases are bound to this Pages project. Both bindings
# are required; they are distinct databases with distinct binding names.

# D1 database — backs the TK Guest Book (functions/api/tribute/tk/guestbook.js).
# The binding name `DB` is what the Function reads as `env.DB`. Create the
# database and apply migrations/0001_tribute_guestbook.sql, then set the real
# `database_id` here AND bind it in the Pages dashboard
# (Settings → Functions → D1 database bindings → Variable name: DB). See docs/DEPLOY.md.
[[d1_databases]]
binding = "DB"
database_name = "luscious-honey-collective-guestbook"
database_id = "a756b1fc-1b3b-4fd3-8a4c-ae5b6eb8a55d"

# D1 — the House's own database (dedicated to LHC; NOT the Pull Me Under DB).
# Pages reads this binding at deploy time and exposes it to Functions as env.LHC_DB.
# Local `wrangler pages dev` uses a local shadow of this database.
[[d1_databases]]
binding = "LHC_DB"
database_name = "lhc-hq"
database_id = "8df865d4-a6ba-429d-8f2f-76001c3de294"

# --- Production environment variables (Wrangler-managed) ---------------------
# Top-level [vars] applies to the PRODUCTION environment. EMAIL_FROM is the
# Resend-verified sender used by functions/_lib/email.js. It is a non-secret
# identifier; the RESEND_API_KEY is stored separately as a Production secret.
# Preview scope (below) is defined independently and is unaffected.
[vars]
EMAIL_FROM = "Luscious Honey Collective <editorial@luscioushoneycollective.com>"
# Production Cloudflare Access verifier config. The existing self-hosted Access
# application "Production Studio (private)" protects /production-studio* and
# /editorial-office* on the custom domain; the middleware verifies JWTs against
# these. Non-secret identifiers (team subdomain + Access app audience tag).
ACCESS_TEAM_DOMAIN = "late-rain-ce05.cloudflareaccess.com"
ACCESS_AUD = "c6e2468653cbba2cdeff5f44a8bb7be24739ace96742ac099a1334640d183794"
# House notifications (functions/_lib/notifications.js). NOTIFY_EMAIL is where
# arrival / gone-quiet notices go; unset means notices are recorded in D1 with
# an honest 'not_configured' status and no email is attempted. The staleness
# threshold and re-notice cooldown are optional overrides (hours; defaults 48
# and 72). NOTIFY_SWEEP_KEY, if ever wanted, is a Production SECRET (not set
# here) letting an external scheduler POST /api/notifications {action:'sweep'}.
NOTIFY_EMAIL = "melody@melodyrash.com"
#STALE_AFTER_HOURS = "48"
#STALE_COOLDOWN_HOURS = "72"

# --- Cloudflare Access verifier config — PREVIEW ONLY ------------------------
# The middleware verifies Access JWTs against these. They are set ONLY for the
# preview environment so the branch preview can authenticate reviewers via the
# existing "Production Studio (private)" Access application. Production is
# deliberately NOT given these here, so production behaviour is unchanged until
# launch is configured separately. Carried in wrangler.toml (not just the
# dashboard) because a direct-upload `wrangler pages deploy` rewrites the
# project's deployment config, which would otherwise drop dashboard-set vars.
# These are non-secret identifiers (team subdomain + Access app audience tag),
# not credentials — no key or token is stored here.
[env.preview.vars]
ACCESS_TEAM_DOMAIN = "late-rain-ce05.cloudflareaccess.com"
ACCESS_AUD = "c6e2468653cbba2cdeff5f44a8bb7be24739ace96742ac099a1334640d183794"
