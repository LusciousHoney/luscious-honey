# Cloudflare Pages — Luscious Honey Collective Headquarters
#
# This is a SEPARATE Pages project from Pull Me Under (which deploys from its own
# GitHub repo). This project is a static site; Wrangler uploads ./dist directly.
#
# Deploy:  npm run build && npx wrangler pages deploy
#   (reads `name` and `pages_build_output_dir` below — no directory argument needed)

name = "luscious-honey-collective"
compatibility_date = "2026-07-09"
pages_build_output_dir = "dist"

# D1 — the House's own database (dedicated to LHC; NOT the Pull Me Under DB).
# Pages reads this binding at deploy time and exposes it to Functions as env.LHC_DB.
# Local `wrangler pages dev` uses a local shadow of this database.
[[d1_databases]]
binding = "LHC_DB"
database_name = "lhc-hq"
database_id = "8df865d4-a6ba-429d-8f2f-76001c3de294"
