# Cloudflare Pages — Luscious Honey Collective Headquarters
#
# This is a SEPARATE Pages project from Pull Me Under (which deploys from its own
# GitHub repo). This project is a static site; Wrangler uploads ./dist directly.
#
# Deploy:  npm run build && npx wrangler pages deploy
#   (reads `name` and `pages_build_output_dir` below — no directory argument needed)

name = "luscious-honey-collective"
compatibility_date = "2026-07-09"
pages_build_output_dir = "dist"

# D1 database — backs the TK Guest Book (functions/api/tribute/tk/guestbook.js).
# The binding name `DB` is what the Function reads as `env.DB`. Create the
# database and apply migrations/0001_tribute_guestbook.sql, then set the real
# `database_id` here AND bind it in the Pages dashboard
# (Settings → Functions → D1 database bindings → Variable name: DB). See docs/DEPLOY.md.
[[d1_databases]]
binding = "DB"
database_name = "luscious-honey-collective-database"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
