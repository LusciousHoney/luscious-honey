<!DOCTYPE html>
<html lang="en" data-env="development" data-tod="evening">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editorial Office — Luscious Honey Collective (private)</title>
    <meta name="description" content="Editorial operations for Luscious Honey Collective — the editorial floor: dashboard, submission review, and correspondence." />
    <!-- Private, founder-only. Never indexed; the real gate is Cloudflare
         Access on /editorial-office* — see docs/DEPLOY.md. -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="color-scheme" content="dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,200;0,6..72,300;0,6..72,400;1,6..72,200;1,6..72,300&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="office-page">
    <a class="skip-link" href="#main">Skip to the editorial floor</a>

    <div class="container">
      <header class="site-header office-masthead">
        <span class="wordmark">Luscious&nbsp;Honey <b>Collective</b></span>
        <span class="label" aria-hidden="true">Editorial Office · private</span>
      </header>
    </div>

    <main id="main" class="office">
      <!-- The Editorial Office mounts here as a single application with three
           in-app views (Dashboard · Review · Detail), switched by query params.
           Everything below is the pre-boot state: a plain, honest document
           beneath the workspace, per Sprint 04 (Accessibility). -->
      <div id="office-app" class="office-app" aria-live="polite">
        <div class="eo-state eo-state--loading" role="status">
          <p class="label">Editorial Office</p>
          <p class="eo-state__lede">Opening the editorial floor…</p>
        </div>
      </div>

      <noscript>
        <div class="container eo-noscript">
          <p class="label">Editorial Office</p>
          <p>This private workspace needs JavaScript to render. <a href="/">Return to the corridor</a>.</p>
        </div>
      </noscript>
    </main>

    <footer class="colophon">
      <div class="container">
        <p class="wordmark">Luscious Honey Collective</p>
        <p class="meta">A house for storytellers · MMXXVI</p>
      </div>
    </footer>

    <script type="module" src="/src/editorial-office.ts"></script>
  </body>
</html>
