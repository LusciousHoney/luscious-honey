<!DOCTYPE html>
<html lang="en" data-env="development" data-tod="evening">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not found — Luscious Honey Collective</title>
    <meta name="robots" content="noindex" />
    <meta name="color-scheme" content="dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,200;0,6..72,300;1,6..72,200;1,6..72,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { --alabaster:#F3EEE6; --plaster:#C9BFB0; --brass-hi:#D3B072; --ink-900:#17120E; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; background: var(--ink-900); color: var(--alabaster);
        font-family: 'Newsreader', Georgia, serif; font-weight: 300;
        display: grid; place-items: center; text-align: center; padding: 2rem;
      }
      .eyebrow {
        font-family: 'Archivo', system-ui, sans-serif; font-weight: 600; font-size: 0.78rem;
        letter-spacing: 0.16em; text-transform: uppercase; color: var(--brass-hi); margin: 0 0 1rem;
      }
      h1 { font-weight: 200; font-size: clamp(2rem, 1.4rem + 2.6vw, 3.25rem); margin: 0 0 1rem; line-height: 1.12; }
      p { color: var(--plaster); font-style: italic; max-width: 40ch; margin: 0 auto 1.75rem; }
      a {
        font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; letter-spacing: 0.16em;
        text-transform: uppercase; color: var(--brass-hi); text-decoration: none;
        border-bottom: 1px solid var(--brass-hi); padding-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Luscious Honey Collective</p>
      <h1>This door doesn’t open.</h1>
      <p>There’s no room at this address. The corridor is back the way you came.</p>
      <a href="/">Return to the House →</a>
    </main>
  </body>
</html>
